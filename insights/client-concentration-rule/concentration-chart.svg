<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="Inter, system-ui, sans-serif">
  <rect width="720" height="360" fill="#fafafa"/>
  <text x="60" y="44" font-size="11" fill="#999" letter-spacing="1.5">THE BOOK AS A PORTFOLIO</text>
  <text x="660" y="44" text-anchor="end" font-size="11" fill="#999" letter-spacing="1.5">POSITION SIZE, % OF REVENUE</text>
  <text x="60" y="88" font-size="11" fill="#555" letter-spacing="1.5">CLIENT 01</text>
  <rect x="150" y="74" width="357" height="24" fill="#111" fill-opacity="0.85" rx="2"/>
  <text x="497" y="92" text-anchor="end" font-size="12" fill="#ffffff" font-weight="600">28%</text>
  <text x="60" y="134" font-size="11" fill="#555" letter-spacing="1.5">CLIENT 02</text>
  <rect x="150" y="120" width="268" height="24" fill="#111" fill-opacity="0.65" rx="2"/>
  <text x="428" y="138" font-size="12" fill="#111" font-weight="600">21%</text>
  <text x="60" y="180" font-size="11" fill="#555" letter-spacing="1.5">CLIENT 03</text>
  <rect x="150" y="166" width="217" height="24" fill="#111" fill-opacity="0.5" rx="2"/>
  <text x="377" y="184" font-size="12" fill="#111" font-weight="600">17%</text>
  <text x="60" y="226" font-size="11" fill="#555" letter-spacing="1.5">CLIENT 04</text>
  <rect x="150" y="212" width="166" height="24" fill="#111" fill-opacity="0.38" rx="2"/>
  <text x="326" y="230" font-size="12" fill="#111" font-weight="600">13%</text>
  <text x="60" y="272" font-size="11" fill="#555" letter-spacing="1.5">CLIENT 05</text>
  <rect x="150" y="258" width="115" height="24" fill="#111" fill-opacity="0.28" rx="2"/>
  <text x="275" y="276" font-size="12" fill="#111" font-weight="600">9%</text>
  <line x1="533" y1="60" x2="533" y2="296" stroke="#111" stroke-width="1.5" stroke-dasharray="5 5"/>
  <text x="543" y="316" font-size="11" font-weight="700" fill="#111" letter-spacing="1.5">THE 30% LINE</text>
  <line x1="150" y1="296" x2="660" y2="296" stroke="#ccc" stroke-width="1"/>
