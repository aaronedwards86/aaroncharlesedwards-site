label: "About"
title: "The story"
body: >-
  Aaron co-founded The Charles Group in 2011 with his sister Samantha Edwards.
  With almost identical views on brands, businesses, and the creative landscape,
  they set out to build an agency with a difference.


  That conviction built a firm that now serves Fortune 50 clients across luxury,
  lifestyle, and financial services, including Cartier, HP, St. Regis, Boston
  Consulting Group, and IBM, from offices in New York, Chicago, and London. A
  five-time Inc. 5000 honoree, the work has earned a Cannes Lion, D&AD Pencils,
  Webby Awards, and a reputation for creative excellence that moves numbers.


  Before building The Charles Group, Aaron studied and worked in finance, a
  background that still shapes every engagement. He leads with analytical rigor:
  financial modeling, forecasting, and business-case development that turns
  marketing from a cost center into a growth engine. He coined the term
  "Brandformance™" to describe this philosophy, fusing brand strategy with
  performance accountability to solve for the business challenge, not just the
  marketing challenge.


  He is based in New York.
