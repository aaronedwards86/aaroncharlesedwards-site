label: "Speaking"
title: "Keynotes, panels & guest lectures"
intro: >-
  Aaron Edwards is available for keynotes, executive workshops, panels, and
  guest lectures on luxury brand strategy, the business of creativity, and the
  intersection of marketing and finance.
topics:
  - title: "Brandformance™"
    description: "Fusing brand strategy with performance accountability to solve business challenges, not just marketing ones."
  - title: "Luxury Brand Strategy"
    description: "How the world's most iconic brands build desire, command premium, and scale without dilution."
  - title: "The Business of Creativity"
    description: "Building and scaling a creative agency with analytical rigor, financial modeling, and operational discipline."
  - title: "Marketing & Finance"
    description: "Turning marketing from a cost center into a growth engine through forecasting, business-case development, and data-driven strategy."
